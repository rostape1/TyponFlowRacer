<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIS Tracker</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a1628">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <!-- Try local Leaflet first, fall back to CDN -->
    <link rel="stylesheet" href="/static/lib/leaflet.css"
          onerror="this.onerror=null;this.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'" />
    <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
    <div id="map"></div>

    <!-- Status bar -->
    <div id="status-bar">
        <span id="connection-status" class="status-disconnected">Disconnected</span>
        <span id="vessel-count">0 vessels</span>
        <span id="message-count">0 messages</span>
        <button id="flow-toggle" title="Toggle tidal flow animation">Flow: ON</button>
        <button id="wind-toggle" title="Toggle wind overlay">Wind: OFF</button>
    </div>

    <!-- Current flow legend -->
    <div id="flow-legend">
        <div class="flow-legend-title">Current Speed (kn)</div>
        <div class="flow-legend-bar" id="flow-legend-bar"></div>
        <div class="flow-legend-labels">
            <span>0</span><span>1</span><span>2</span><span>3</span><span>4+</span>
        </div>
        <div class="flow-legend-source" id="flow-legend-source"></div>
    </div>

    <!-- Wind speed legend -->
    <div id="wind-legend">
        <div class="wind-legend-title">Wind Speed (kn) <span id="wind-color-toggle"><span class="color-dot green" data-scheme="green"></span><span class="color-dot purple" data-scheme="purple"></span></span></div>
        <div class="wind-legend-bar" id="wind-legend-bar"></div>
        <div class="wind-legend-labels">
            <span>0</span><span>8</span><span>15</span><span>25</span><span>35+</span>
        </div>
        <div class="wind-legend-source" id="wind-legend-source"></div>
    </div>

    <!-- Own vessel arrow legend -->
    <div id="arrow-legend">
        <div class="arrow-legend-title">OWN VESSEL</div>
        <div class="arrow-legend-row"><span class="arrow-swatch" style="background:#ffffff"></span> Heading</div>
        <div class="arrow-legend-row"><span class="arrow-swatch" style="background:#2ecc71"></span> COG</div>
        <div class="arrow-legend-row"><span class="arrow-swatch" style="background:#00d4ff"></span> Tide</div>
        <div class="arrow-legend-row"><span class="arrow-swatch" style="background:#aa46be"></span> Wind</div>
    </div>

    <!-- Side panel -->
    <div id="panel">
        <div id="panel-header">
            <h2>Vessels</h2>
            <button id="panel-toggle" title="Collapse">&lsaquo;</button>
        </div>
        <div id="vessel-list"></div>
    </div>

    <!-- Try local Leaflet first, fall back to CDN -->
    <script>
        function loadScript(src, fallback) {
            return new Promise((resolve) => {
                const s = document.createElement('script');
                s.src = src;
                s.onload = resolve;
                s.onerror = () => {
                    if (fallback) {
                        const f = document.createElement('script');
                        f.src = fallback;
                        f.onload = resolve;
                        document.head.appendChild(f);
                    } else {
                        resolve();
                    }
                };
                document.head.appendChild(s);
            });
        }

        loadScript('/static/lib/leaflet.js', 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js')
            .then(() => loadScript('/static/js/tidal-flow.js'))
            .then(() => loadScript('/static/js/wind-overlay.js'))
            .then(() => loadScript('/static/js/app.js'));

        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
