<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typon Flowracer</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a1628">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <!-- Try local Leaflet first, fall back to CDN -->
    <link rel="stylesheet" href="/static/lib/leaflet.css"
          onerror="this.onerror=null;this.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'" />
    <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
    <div id="map"></div>

    <!-- Offline banner -->
    <div id="offline-banner" class="offline-banner hidden">
        OFFLINE — using cached data
        <span id="offline-cache-age"></span>
    </div>

    <!-- Forecast banner -->
    <div id="forecast-banner" class="forecast-banner hidden">
        FORECAST: <span id="forecast-time-display"></span>
        <div id="forecast-progress-bar" class="forecast-progress-bar"></div>
    </div>

    <!-- Timeline strip (Windy-style) -->
    <div id="timeline-strip">
        <div class="timeline-btn-row">
            <button id="timeline-go" class="timeline-go hidden" title="Load forecast">GO</button>
        </div>
        <div id="timeline-scroll">
            <div id="timeline-track"><!-- populated by JS --></div>
        </div>
    </div>

    <!-- Status bar -->
    <div id="status-bar">
        <span id="connection-status" class="status-disconnected">Disconnected</span>
        <span id="vessel-count">0 vessels</span>
        <span id="message-count">0 messages</span>
        <span id="offline-dl-age" class="offline-dl-age"></span>
        <button id="layers-btn" class="layers-btn" title="Map layers">&#x2630;</button>
    </div>

    <!-- Layer toggles (desktop: inline in status area, mobile: slide-up tray) -->
    <div id="layers-tray" class="layers-tray">
        <button id="timeline-now" class="timeline-now-btn" title="Reset to now">NOW</button>
        <button id="timeline-calendar" class="timeline-cal-btn" title="Pick a date for tide forecast">&#x1F4C5;</button>
        <button id="offline-download" class="timeline-dl-btn" title="Download 24h for offline use">&#x2B07;</button>
        <button id="flow-toggle" title="Toggle tidal flow animation">Flow: ON</button>
        <button id="heatmap-toggle" title="Toggle current speed heatmap">Heatmap: ON</button>
        <button id="wind-toggle" title="Toggle wind overlay">Wind: OFF</button>
        <button id="tide-toggle" title="Toggle tide height stations">Tide: OFF</button>
        <button id="vessels-toggle" title="Toggle vessel list">Vessels: OFF</button>
    </div>

    <!-- Forecast quick buttons (mobile only, replaces timeline scroll) -->
    <div id="forecast-quick-btns" class="forecast-quick-btns">
        <button id="fcst-now" class="fcst-quick-btn fcst-now-btn">NOW</button>
        <button class="fcst-quick-btn fcst-hour-btn" data-hours="1">+1h</button>
        <button class="fcst-quick-btn fcst-hour-btn" data-hours="2">+2h</button>
        <button class="fcst-quick-btn fcst-hour-btn" data-hours="3">+3h</button>
        <button class="fcst-quick-btn fcst-hour-btn" data-hours="4">+4h</button>
        <button id="fcst-set-time" class="fcst-quick-btn fcst-set-btn">Set FCST TIME</button>
    </div>

    <!-- Mobile vessel list (shown when vessels toggle is ON) -->
    <div id="mobile-vessel-list" class="mobile-vessel-list hidden"></div>

    <!-- Offline download progress -->
    <div id="offline-dl-panel" class="offline-dl-panel hidden">
        <div class="offline-dl-title">Downloading for Offline</div>
        <div class="offline-dl-bar-track">
            <div id="offline-dl-bar" class="offline-dl-bar-fill"></div>
        </div>
        <div id="offline-dl-status" class="offline-dl-status">0 / 96</div>
        <div id="offline-dl-last" class="offline-dl-last"></div>
    </div>

    <!-- Date/time picker panel -->
    <div id="time-picker-panel" class="time-picker-panel hidden">
        <div class="time-picker-title">Forecast Date &amp; Time</div>
        <div class="time-picker-inputs">
            <input type="date" id="forecast-date" />
            <input type="time" id="forecast-time" value="12:00" />
        </div>
        <div class="time-picker-actions">
            <button id="forecast-go" class="time-picker-btn go">Go</button>
            <button id="forecast-cancel" class="time-picker-btn cancel">Cancel</button>
        </div>
        <div class="time-picker-note">Tides: unlimited &middot; Wind: up to 48h</div>
    </div>

    <!-- Current flow legend -->
    <div id="flow-legend">
        <div class="flow-legend-title">Current Speed (kn)</div>
        <div class="flow-legend-bar" id="flow-legend-bar"></div>
        <div class="flow-legend-labels">
            <span>0</span><span>1</span><span>2</span><span>3</span><span>4+</span>
        </div>
        <div class="flow-legend-source" id="flow-legend-source"></div>
    </div>

    <!-- Wind speed legend -->
    <div id="wind-legend">
        <div class="wind-legend-title">Wind Speed (kn) <span id="wind-color-toggle"><span class="color-dot green" data-scheme="green"></span><span class="color-dot purple" data-scheme="purple"></span></span></div>
        <div class="wind-legend-bar" id="wind-legend-bar"></div>
        <div class="wind-legend-labels">
            <span>0</span><span>8</span><span>15</span><span>25</span><span>35+</span>
        </div>
        <div class="wind-legend-source" id="wind-legend-source"></div>
    </div>

    <!-- Side panel -->
    <button id="panel-toggle" title="Toggle vessel list">&lsaquo;</button>
    <div id="panel">
        <div id="panel-header">
            <h2>Vessels</h2>
        </div>
        <div id="vessel-search-wrap">
            <input type="text" id="vessel-search" placeholder="Search name or MMSI..." autocomplete="off" />
        </div>
        <div id="vessel-list"></div>
    </div>

    <!-- Try local Leaflet first, fall back to CDN -->
    <script>
        function loadScript(src, fallback) {
            return new Promise((resolve) => {
                const s = document.createElement('script');
                s.src = src;
                s.onload = resolve;
                s.onerror = () => {
                    if (fallback) {
                        const f = document.createElement('script');
                        f.src = fallback;
                        f.onload = resolve;
                        document.head.appendChild(f);
                    } else {
                        resolve();
                    }
                };
                document.head.appendChild(s);
            });
        }

        loadScript('/static/lib/leaflet.js', 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js')
            .then(() => loadScript('/static/js/tidal-flow.js'))
            .then(() => loadScript('/static/js/wind-overlay.js'))
            .then(() => loadScript('/static/js/app.js'));

        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
