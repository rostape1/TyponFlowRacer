name: Fetch Wind Grid (HRRR)

on:
  schedule:
    - cron: '7 * * * *'  # Hourly, matching HRRR model updates
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Restore data cache
        uses: actions/cache/restore@v5
        with:
          path: static/data
          key: env-data

      - name: Fetch wind grid
        run: python .github/scripts/fetch_wind.py

      - name: Save data cache
        uses: actions/cache/save@v5
        with:
          path: static/data
          key: env-data-${{ github.run_id }}-wind

      - name: Trigger deploy
        uses: peter-evans/repository-dispatch@v4
        with:
          event-type: data-updated
          client-payload: '{"source": "wind"}'
