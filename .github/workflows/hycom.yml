name: Fetch HYCOM Ocean Currents

on:
  schedule:
    - cron: '15 */3 * * *'  # Every 3 hours (matches HYCOM 3-hourly data)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Restore data cache
        uses: actions/cache/restore@v5
        with:
          path: static/data
          key: env-data
          restore-keys: |
            env-data-

      - name: Fetch HYCOM currents
        run: python .github/scripts/fetch_hycom.py

      - name: Save data cache
        uses: actions/cache/save@v5
        with:
          path: static/data
          key: env-data-${{ github.run_id }}-hycom

      - name: Trigger deploy
        uses: peter-evans/repository-dispatch@v4
        with:
          event-type: data-updated
          client-payload: '{"source": "hycom"}'
