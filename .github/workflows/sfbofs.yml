name: Fetch SFBOFS Current Field

on:
  schedule:
    - cron: '15 3,9,15,21 * * *'  # After NOAA model runs
  workflow_dispatch:  # Manual trigger for testing

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Restore data cache
        uses: actions/cache/restore@v4
        with:
          path: static/data
          key: env-data

      - name: Fetch SFBOFS data
        run: python .github/scripts/fetch_sfbofs.py

      - name: Save data cache
        uses: actions/cache/save@v4
        with:
          path: static/data
          key: env-data-${{ github.run_id }}-sfbofs

      - name: Trigger deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: data-updated
          client-payload: '{"source": "sfbofs"}'
